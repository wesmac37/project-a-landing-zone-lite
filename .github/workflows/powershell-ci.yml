name: PowerShell CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    name: Analyze and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer and Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -MinimumVersion 1.21.0 -Force -Scope CurrentUser
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run PSScriptAnalyzer (fail on Error severity)
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning,Information -ExcludeRule PSAvoidUsingWriteHost
          $results | Format-Table -AutoSize | Out-String | Write-Host

          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          if ($errors.Count -gt 0) {
            Write-Host "PSScriptAnalyzer found $($errors.Count) error-severity issue(s)." -ForegroundColor Red
            exit 1
          }
          else {
            Write-Host 'PSScriptAnalyzer found no error-severity issues.' -ForegroundColor Green
          }

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Run.Exit = $true
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = './TestResults/pester-results.xml'
          $config.Output.Verbosity = 'Detailed'

          Invoke-Pester -Configuration $config

      - name: Upload Pester test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-test-results
          path: TestResults/pester-results.xml
          retention-days: 30
